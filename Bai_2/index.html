<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Tập 2 - Tính Trung Bình</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f0f2f5; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        h3 { color: #e67e22; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #d35400; }
        #hienThiKetQua { margin-top: 20px; padding: 15px; background-color: #fff3e0; border-left: 5px solid #e67e22; font-weight: bold; text-align: center; display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h3>BÀI 2: TRUNG BÌNH 5 SỐ</h3>
        
        <input type="number" id="num1" placeholder="Nhập số thứ 1">
        <input type="number" id="num2" placeholder="Nhập số thứ 2">
        <input type="number" id="num3" placeholder="Nhập số thứ 3">
        <input type="number" id="num4" placeholder="Nhập số thứ 4">
        <input type="number" id="num5" placeholder="Nhập số thứ 5">
        
        <button onclick="tinhTrungBinh()">TÍNH KẾT QUẢ</button>

        <div id="hienThiKetQua"></div>
    </div>

    <script>
    
        function tinhTrungBinh() {       
            var n1 = Number(document.getElementById('num1').value);
            var n2 = Number(document.getElementById('num2').value);
            var n3 = Number(document.getElementById('num3').value);
            var n4 = Number(document.getElementById('num4').value);
            var n5 = Number(document.getElementById('num5').value);           
            var trungBinh = (n1 + n2 + n3 + n4 + n5) / 5;
            var divKetQua = document.getElementById('hienThiKetQua');           
            divKetQua.style.display = "block";      
            divKetQua.innerHTML = "Giá trị trung bình là: " + trungBinh;
                
            console.log("Kết quả tính được là: ", trungBinh);
        }
    </script>
</body>
</html>
