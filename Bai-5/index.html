<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính Tổng 2 Ký Số</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .box { max-width: 300px; border: 1px solid #ddd; padding: 15px; border-radius: 5px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; background: #ff9800; color: white; border: none; padding: 10px; cursor: pointer; }
        #result { margin-top: 15px; color: blue; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h3>Bài 5: Tổng 2 ký số</h3>
    <input type="number" id="numberInput" placeholder="Nhập số có 2 chữ số (VD: 12, 44)">
    <button onclick="tinhTong()">Tính Tổng</button>
    <div id="result"></div>
</div>

<script src="main.js"></script>
</body>
</html>
